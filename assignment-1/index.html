<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Story Generator</title>
    </head>
    <body>
        <h1>Story Generator</h1>

        <div>
            <button id="nounBtn">Noun</button>
            <span id="nounOut"></span>
        </div>

        <div>
            <button id="verbBtn">Verb</button>
            <span id="verbOut"></span>
        </div>

        <div>
            <button id="adjBtn">Adjective</button>
            <span id="adjOut"></span>
        </div>
        
        <div>
            <button id="placeBtn">Place</button>
            <span id="placeOut"></span>
        </div>

        <div>
            <button id="timeBtn">Time</button>
            <span id="timeOut"></span>            
        </div>

        <div>
            <button id="Ending">Ending</button>
            <span id="endingOut"></span>
        </div>

        <button id="showStoryBtn">Show Story</button>

        <p id="storyOutput"></p>
    </body>
</html>
