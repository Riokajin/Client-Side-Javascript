<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Story Generator</title>
        <script src="js/script.js" defer></script>
    </head>
    <body>
        <h1>Story Generator</h1>

        <div>
            <button id="charBtn">Character</button>
            <span id="characterOut"></span>
        </div>

        <div>
            <button id="actionBtn">Action</button>
            <span id="actionOut"></span>
        </div>

        <div>
            <button id="thingBtn">Thing</button>
            <span id="thingOut"></span>
        </div>
        
        <div>
            <button id="locationBtn">Location</button>
            <span id="locationOut"></span>
        </div>

        <div>
            <button id="Ending">Ending</button>
            <span id="endingOut"></span>
        </div>

        <button id="showStoryBtn">Show Story</button>

        <p id="storyOutput"></p>
    </body>
</html>
